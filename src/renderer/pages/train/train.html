<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Train - Data Upload & Training</title>
  <link rel="stylesheet" href="train.css">
  <link rel="stylesheet" href="../../shared/styles.css">
  <script src="train.js"></script>
  <script src="https://kit.fontawesome.com/b6c486d3d4.js" crossorigin="anonymous"></script>
</head>
<body>
  <div class="dropdown-box vertbox">
    <div class="header"><span><i class="fa-solid fa-caret-down open-icon"></i>Training Samples</span></div>
    <div class="content horibox open">
      <div class="samples vertbox">
        <div class="sample-box vertbox selected">
          <div class="sample-box-header">Positive</div>
          <div class="sample-box-content">Click to upload</div>
        </div>
        <div class="sample-box vertbox">
          <div class="sample-box-header">Negative</div>
          <div class="sample-box-content">Click to upload</div>
        </div>
      </div>
      <div class="webcam-box vertbox">

        <div class="webcam">
          <canvas class="canvas" width="300" height="300"></canvas>
        </div>
        
        <button class="webcam-button"><i class="fa-solid fa-record-vinyl"></i>Hold to Record</button>
      </div>
    </div>
  </div>
  <button class="train-button"><i class="fa-solid fa-play"></i>Train</button>
  
</body>
</html>
